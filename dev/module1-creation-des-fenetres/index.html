  <div class="titres" id ="Titre4">Je suis le quatrième titre</div>

  <div class="textes" id ="Texte0">on compte comme ça en programmation, de 0 a l'infini</div>
  <div class="textes" id ="Texte1">le 1er texte</div>
  <div class="textes" id ="Texte2">le 2eme texte</div>
